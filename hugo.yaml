baseURL: https://major.io/
locale: en
title: Major Hayden
copyright: 'All content licensed <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>'

enableGitInfo: true
enableRobotsTXT: true
summaryLength: 0

pagination:
  pagerSize: 10

permalinks:
  posts: /p/:contentbasename/

outputs:
  home:
    - HTML
    - RSS

services:
  rss:
    limit: 25

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
  tableOfContents:
    startLevel: 1
    endLevel: 4

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 30
    - identifier: cv
      name: CV
      url: /cv/
      weight: 40

module:
  hugoVersion:
    extended: true
    min: 0.146.0
  imports:
    - path: github.com/panr/hugo-theme-terminal/v4

params:
  # -- Content / layout --
  contentTypeName: posts # dir name of main content; listed on the index page
  showMenuItems: 4 # 0 = only the "show more" submenu trigger is visible
  showLanguageSelector: false # site is single-language; no switcher needed
  fullWidthTheme: false # theme default
  centerTheme: false # left-align content instead of centering it
  autoCover: false # cover images are disabled site-wide (see layouts/partials/cover.html)
  showLastUpdated: false # show "last updated" date (uses enableGitInfo above)
  updatedDatePrefix: "Updated" # theme default
  readingTime: true # show estimated reading time on posts
  Toc: false # theme default; table of contents off (overridable per-post)
  TocTitle: "Table of Contents" # theme default; only used if Toc is enabled
  dateFormat: "2 January 2006" # theme default is "2006-01-02"

  # -- UI strings (no built-in fallback in the theme templates) --
  subtitle: "A social nerd writing about everything"
  owner: "" # theme default
  keywords: "" # theme default
  menuMore: "Show more" # theme default
  readMore: "Read more" # theme default
  readOtherPosts: "Read other posts" # theme default
  newerPosts: "Newer posts" # theme default
  olderPosts: "Older posts" # theme default
  missingContentMessage: "Page not found..." # theme default
  missingBackButtonLabel: "Back to home page" # theme default
  minuteReadingTime: "min read" # theme default
  words: "words" # theme default

  logo:
    logoText: "Major Hayden"
    logoHomeLink: "/"

  twitter:
    creator: "" # theme default
    site: "" # theme default

  author:
    name: "Major Hayden"
    email: "major@mhtx.net"
